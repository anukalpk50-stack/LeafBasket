<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./output.css">
    <title>Login</title>
    <link rel="shortcut icon" href="/images/LeafBasket.png" type="image/x-icon">
    <style>
      @layer utilities {
        .bg-brand { background-color: #78b032; }
        .text-brand { color: #78b032; }
      }
    </style>
    <title>Document</title>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md border border-gray-100">
    <div class="text-center mb-5">
       <div class="mb-0">
    <img class="h-24 w-auto mx-auto object-contain" src="/images/LeafBasket text-logo.png" alt="LeafBasket Logo" >
  </div>
      <p class="text-2xl font-bold text-brand">Sign in to your account</p>
    </div>

    <form class="space-y-4" action="/hero-page/hero.html">
      <div>
        <label class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-[#78b032] outline-none" placeholder="me@example.com">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-[#78b032] outline-none" placeholder="••••••••">
      </div>
      
      <div class="flex justify-between items-center text-sm">
        <label class="flex items-center"><input type="checkbox" class="mr-2"> Remember Me</label>
        <a href="/forgot-password/forgot.html" class="text-brand hover:underline">Forgot Password?</a>
      </div>
      <button type="submit" class="w-full bg-brand text-white py-3 rounded-lg font-semibold hover:bg-[#629228] transition">Login</button>
    </form>

    <p class="text-center text-sm mt-6 text-gray-600">
      Don't have an account? <a href="/register/register.html" class="text-brand font-bold hover:underline">Register here</a>
    </p>
  </div>
</body>
</html>
