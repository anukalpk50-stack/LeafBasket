<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shipping Address - LeafBasket</title>
  <link rel="shortcut icon" href="/images/LeafBasket.png" type="image/x-icon">
  <link rel="stylesheet" href="/shipping-address/shipping-output.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brandGreen: '#2d5a27' } } } }
  </script>
</head>
<body class="bg-gray-50 min-h-screen">

  <header class="bg-white shadow-sm sticky top-0 z-50">
    <nav class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      
      <a href="/hero-page/hero.html" class="flex items-center gap-2 hover:opacity-90 transition">
        <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center">
          <span class="text-green-700 font-bold"><img src="/images/LeafBasket.png"></span>
        </div>
        <span class="text-xl font-bold text-green-800">LeafBasket</span>
      </a>

      <div class="hidden md:flex items-center gap-8 font-medium text-gray-600">
        <a href="/hero-page/hero.html" class="hover:text-green-700">Home</a>
        <a href="#" class="hover:text-green-700">Shop</a>
        <a href="#" class="hover:text-green-700">About</a>
        <a href="/login/login.html" class="hover:text-green-700">Login</a>
      </div>

      <button class="bg-green-800 text-white px-6 py-2 rounded-full font-semibold hover:bg-green-900 transition">
        Search
      </button>
    </nav>
  </header>

  <div class="max-w-5xl mx-auto p-4 md:p-8">
    <h1 class="text-3xl font-bold text-brandGreen mb-8">Shipping Address</h1>

    <div class="grid lg:grid-cols-3 gap-8">
      
      <div class="lg:col-span-2 space-y-8">
        <!-- Delivery Details -->
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100">
          <h2 class="text-xl font-bold mb-6">Delivery Details</h2>
          <form class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <input type="text" placeholder="First Name" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-brandGreen">
              <input type="text" placeholder="Last Name" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-brandGreen">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <input type="email" placeholder="Email Address" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-brandGreen">
              <input type="tel" placeholder="Phone Number" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-brandGreen">
            </div>
            <input type="text" placeholder="Street Address" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-brandGreen">
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
              <input type="text" placeholder="City" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-brandGreen">
              <input type="text" placeholder="State/Province" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-brandGreen">
              <input type="text" placeholder="Postal Code" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-brandGreen">
            </div>
            <select class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-brandGreen text-gray-500 bg-white">
              <option value="" disabled selected>Select Country</option>
              <option value="IN">India</option>
              <option value="US">United States</option>
              <option value="UK">United Kingdom</option>
            </select>
          </form>
        </div>

        <!-- Payment Method -->
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100">
          <h2 class="text-xl font-bold mb-6">Payment Method</h2>
          <div class="space-y-4">
            
            <!-- Credit Card -->
            <label class="block border border-brandGreen bg-green-50 rounded-xl p-4 cursor-pointer">
              <div class="flex items-center justify-between">
                <div class="flex items-center">
                  <input type="radio" name="payment" class="w-4 h-4 text-brandGreen focus:ring-brandGreen" checked>
                  <span class="ml-3 font-semibold text-gray-800">Credit / Debit Card</span>
                </div>
                <div class="flex gap-2">
                  <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/Visa.svg" alt="Visa" class="h-5">
                  <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="Mastercard" class="h-5">
                </div>
              </div>
              <div class="mt-4 space-y-4">
                <input type="text" placeholder="Card Number" class="w-full p-3 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-brandGreen bg-white">
                <div class="grid grid-cols-2 gap-4">
                  <input type="text" placeholder="MM/YY" class="w-full p-3 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-brandGreen bg-white">
                  <input type="text" placeholder="CVC" class="w-full p-3 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-brandGreen bg-white">
                </div>
                <input type="text" placeholder="Name on Card" class="w-full p-3 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-brandGreen bg-white">
              </div>
            </label>

            <!-- UPI -->
            <label class="flex items-center border border-gray-200 rounded-xl p-4 cursor-pointer hover:bg-gray-50 transition">
              <input type="radio" name="payment" class="w-4 h-4 text-brandGreen focus:ring-brandGreen">
              <span class="ml-3 font-medium text-gray-700">UPI (GPay, PhonePe, Paytm)</span>
            </label>

            <!-- Cash on Delivery -->
            <label class="flex items-center border border-gray-200 rounded-xl p-4 cursor-pointer hover:bg-gray-50 transition">
              <input type="radio" name="payment" class="w-4 h-4 text-brandGreen focus:ring-brandGreen">
              <span class="ml-3 font-medium text-gray-700">Cash on Delivery</span>
            </label>

          </div>
        </div>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit">
        <h2 class="text-lg font-bold mb-4">Order Summary</h2>
        <div class="space-y-3 text-sm text-gray-600 mb-6">
          <div class="flex justify-between"><span>Subtotal</span> <span>₹4000</span></div>
          <div class="flex justify-between"><span>Shipping charge</span> <span>₹150</span></div>
          <div class="border-t pt-3 flex justify-between font-bold text-lg text-gray-900">
            <span>Total</span> <span>₹4150</span>
          </div>
        </div>
        <button class="w-full bg-brandGreen text-white py-3 rounded-xl font-bold hover:bg-green-900 transition">
          Place Order
        </button>
      </div>

    </div>
  </div>

</body>
</html>
