<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../images/LeafBasket text-logo.png" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
    <title>LeafBasket - Admin Login</title>
</head>
<body class="bg-gray-50 text-gray-900 font-sans flex min-h-screen items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-md border border-gray-100 p-8 space-y-8">
        <!-- Header & Logo -->
        <div class="flex flex-col items-center gap-4">
            <img src="../images/LeafBasket.png" alt="LeafBasket Logo" class="w-20 h-20 bg-green-100 rounded-full p-3 object-contain shadow-sm">
            <div class="text-center">
                <h2 class="text-2xl font-bold text-green-900">Admin Login</h2>
                <p class="text-sm text-gray-500 mt-1">Sign in to manage your LeafBasket store</p>
            </div>
        </div>

        <!-- Form -->
        <form action="../Admin-panel/Admin.html" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
                <input type="email" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 transition shadow-sm" placeholder="admin@leafbasket.com">
            </div>
            <div>
                <div class="flex justify-between items-center mb-1.5">
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <a href="admin-forgot.html" class="text-sm text-green-700 hover:text-green-900 font-semibold transition">Forgot password?</a>
                </div>
                <input type="password" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 transition shadow-sm" placeholder="••••••••">
            </div>
            <div class="flex items-center gap-2">
                <input type="checkbox" id="remember" class="w-4 h-4 text-green-600 rounded border-gray-300 focus:ring-green-500">
                <label for="remember" class="text-sm text-gray-600 cursor-pointer">Remember me</label>
            </div>
            
            <button type="submit" class="w-full bg-green-800 text-white font-bold text-lg py-3.5 rounded-xl hover:bg-green-900 transition shadow-md flex justify-center items-center gap-2 mt-2">
                <i class="ri-login-box-line"></i> Login to Dashboard
            </button>
        </form>
    </div>

</body>
</html>
