<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../images/LeafBasket text-logo.png" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
    <title>LeafBasket - Admin Forgot Password</title>
</head>
<body class="bg-gray-50 text-gray-900 font-sans flex min-h-screen items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-md border border-gray-100 p-8 space-y-8">
        <!-- Header & Logo -->
        <div class="flex flex-col items-center gap-4">
            <img src="../images/LeafBasket.png" alt="LeafBasket Logo" class="w-20 h-20 bg-green-100 rounded-full p-3 object-contain shadow-sm">
            <div class="text-center">
                <h2 class="text-2xl font-bold text-green-900">Reset Password</h2>
                <p class="text-sm text-gray-500 mt-1">Enter your admin email address to receive a secure password reset link.</p>
            </div>
        </div>

        <!-- Form -->
        <form action="admin-login.html" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
                <input type="email" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 transition shadow-sm" placeholder="admin@leafbasket.com">
            </div>
            
            <button type="submit" class="w-full bg-green-800 text-white font-bold text-lg py-3.5 rounded-xl hover:bg-green-900 transition shadow-md flex justify-center items-center gap-2">
                <i class="ri-mail-send-line"></i> Send Reset Link
            </button>

            <div class="text-center pt-2">
                <a href="admin-login.html" class="text-sm text-gray-500 hover:text-green-800 font-semibold transition flex items-center justify-center gap-1.5"><i class="ri-arrow-left-line"></i> Back to Login</a>
            </div>
        </form>
    </div>

</body>
</html>
