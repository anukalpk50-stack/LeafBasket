<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../images/LeafBasket text-logo.png" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
    <title>LeafBasket - Admin Settings</title>
</head>
<body class="bg-gray-50 text-gray-900 font-sans flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-green-900 text-white fixed h-full flex flex-col z-50 transition-all duration-300">
        <div class="h-16 flex items-center px-6 border-b border-green-800">
            <div class="flex items-center gap-2">
                <img src="../images/LeafBasket.png" alt="LeafBasket Logo" class="w-8 h-8 bg-green-100 rounded-full p-1 object-contain">
                <span class="text-xl font-bold tracking-wide">Admin Panel</span>
            </div>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="Admin.html" class="flex items-center gap-3 hover:bg-green-800 px-4 py-3 rounded-xl transition text-green-100">
                <i class="ri-dashboard-line text-lg"></i> <span class="font-medium">Dashboard</span>
            </a>
            <a href="products.html" class="flex items-center gap-3 hover:bg-green-800 px-4 py-3 rounded-xl transition text-green-100">
                <i class="ri-plant-line text-lg"></i> <span class="font-medium">Products</span>
            </a>
            <a href="orders.html" class="flex items-center gap-3 hover:bg-green-800 px-4 py-3 rounded-xl transition text-green-100">
                <i class="ri-shopping-cart-line text-lg"></i> <span class="font-medium">Orders</span>
            </a>
            <a href="customers.html" class="flex items-center gap-3 hover:bg-green-800 px-4 py-3 rounded-xl transition text-green-100">
                <i class="ri-user-line text-lg"></i> <span class="font-medium">Customers</span>
            </a>
            <a href="#" class="flex items-center gap-3 bg-green-800 px-4 py-3 rounded-xl transition">
                <i class="ri-settings-4-line text-lg"></i> <span class="font-medium">Settings</span>
            </a>
        </nav>
        <div class="p-4 border-t border-green-800">
            <a href="../login/login.html" class="flex items-center gap-3 hover:bg-red-600 px-4 py-3 rounded-xl transition text-green-100 hover:text-white">
                <i class="ri-logout-box-r-line text-lg"></i> <span class="font-medium">Logout</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="ml-64 flex-1 flex flex-col w-full">
        <!-- Header -->
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 sticky top-0 z-40">
            <h1 class="font-bold text-xl text-green-800">Settings</h1>
            <div class="flex items-center gap-6">
                <a href="notifications.html" class="text-gray-400 hover:text-green-700 transition relative">
                    <i class="ri-notification-3-line text-2xl"></i>
                </a>
                <div class="flex items-center gap-3 cursor-pointer pl-6 border-l border-gray-200">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=2d5a27&color=fff" alt="Admin Profile" class="w-9 h-9 rounded-full shadow-sm">
                    <span class="font-medium text-sm text-gray-700">Store Admin</span>
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <div class="p-8 space-y-6 max-w-4xl mx-auto w-full">
            
            <!-- Store Settings Card -->
            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="px-8 py-5 border-b border-gray-100">
                    <h3 class="font-bold text-lg text-gray-800">Store Profile</h3>
                    <p class="text-sm text-gray-500 mt-1">Manage your public-facing store information.</p>
                </div>
                <div class="p-8 space-y-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Store Name</label>
                            <input type="text" value="LeafBasket" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Support Email</label>
                            <input type="email" value="support@leafbasket.com" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Store Address</label>
                            <input type="text" value="123 Greenery Lane, Botanica City" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                    </div>
                    <div class="flex justify-end pt-2">
                        <button class="bg-green-800 text-white px-6 py-2.5 rounded-xl font-semibold hover:bg-green-900 transition shadow-sm">Save Changes</button>
                    </div>
                </div>
            </div>

            <!-- Admin Account Card -->
            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="px-8 py-5 border-b border-gray-100">
                    <h3 class="font-bold text-lg text-gray-800">Admin Account</h3>
                    <p class="text-sm text-gray-500 mt-1">Update your login credentials and personal info.</p>
                </div>
                <div class="p-8 space-y-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Admin Name</label>
                            <input type="text" value="Store Admin" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                            <input type="password" placeholder="Leave blank to keep current" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                    </div>
                    <div class="flex justify-end pt-2">
                        <button class="bg-gray-100 text-gray-800 px-6 py-2.5 rounded-xl font-semibold hover:bg-gray-200 transition">Update Account</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
